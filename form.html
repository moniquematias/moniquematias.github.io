<!DOCTYPE html>
<html>
<head>
  <title>Register - MC Travel & Tours</title>
  <style>
    body {
      font-family: Arial;
      background-color: #d9f2ff;
      text-align: center;
      padding-top: 100px;
    }

    input, select {
      padding: 8px;
      margin: 8px;
      width: 220px;
    }

    button {
      padding: 8px 15px;
      background-color: #00aaff;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

  <h1>MC Travel & Tours ✈️</h1>
  <h3>Please register first</h3>

  <form action="index.html" method="post">
    <input type="text" placeholder="Your Name" required><br>
    <input type="email" placeholder="Your Email" required><br>

    <select required>
      <option value="">Choose Package</option>
      <option>Local Tour</option>
      <option>Beach Trip</option>
      <option>International Travel</option>
    </select><br>

    <button type="submit">Enter Website</button>
  </form>

</body>
</html>
